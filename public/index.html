<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Мониторинг Wi-Fi</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <div class="topbar">
      <span class="title">Мониторинг Wi-Fi</span>
      <div class="stats" id="stats">
        <span><span class="dot up"></span>Работают: <b id="cnt-up">—</b></span>
        <span><span class="dot down"></span>Не отвечают: <b id="cnt-down">—</b></span>
        <span><span class="dot unknown"></span>Нет данных: <b id="cnt-unknown">—</b></span>
      </div>
      <span class="spacer"></span>
      <span class="updated" id="updated">загрузка…</span>
      <form method="post" action="/logout"><button class="logout" type="submit">Выйти</button></form>
    </div>
    <div id="map"></div>
  </div>

  <!-- Ключ Yandex и прочий публичный конфиг сервер инжектит сюда -->
  <script src="/config.js"></script>
  <script src="/map.js"></script>
</body>
</html>
