<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Мониторинг Wi-Fi</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="/login">
      <h1>Мониторинг Wi-Fi</h1>
      <p class="sub">Доступность точек доступа</p>
      <label for="username">Логин</label>
      <input id="username" name="username" autocomplete="username" autofocus required>
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Войти</button>
      <div class="login-error" id="err" style="display:none">Неверный логин или пароль</div>
    </form>
  </div>
  <script>
    // При ошибке входа сервер редиректит на /login?e=1 — показываем сообщение.
    if (new URLSearchParams(location.search).has('e')) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
